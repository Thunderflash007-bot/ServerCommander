# ─────────────────────────────────────────────────────────────────────────────
# ServerCommander OS — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────

services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: servercommander-socket-proxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - EXEC=1
      - INFO=1
      - VERSION=1
      - EVENTS=1
      - PING=1
      - POST=1
      - AUTH=0
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - DISTRIBUTION=0
      - NODES=0
      - PLUGINS=0
      - SECRETS=0
      - SERVICES=0
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - TASKS=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: servercommander-os:latest
    container_name: servercommander
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-3000}:3000"

    env_file:
      - .env

    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:/app/data/servercommander.db
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - HOST_FS_MOUNT=/host_system
      - INTERNAL_RPC_SECRET=${INTERNAL_RPC_SECRET}

    depends_on:
      - docker-socket-proxy

    volumes:
      # Persist SQLite database
      - sc_data:/app/data

      # Host filesystem — explicitly scoped mount point
      - ${HOST_FS_SOURCE:-/srv/servercommander}:/host_system:rslave

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    labels:
      - "com.servercommander.managed=true"

volumes:
  sc_data:
    driver: local
    labels:
      - "com.servercommander.volume=data"
